version: "3.9"

services:
  backend:
    build: ./backend

    ports:
      - "8001:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app
      - ./documents:/app/documents
      - chroma_data:/app/chroma_db

    restart: unless-stopped

  frontend:
    build: ./frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - VITE_API_URL=http://localhost:8001

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  chroma_data:
